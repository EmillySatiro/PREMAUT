name: Docker Build and Push

on:
  release:
    types: [ published ]
  workflow_dispatch:


env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            file: ./backend/Dockerfile.prod
            image_name: emillysatiro/premaut-backend
          - service: frontend
            context: ./frontend
            file: ./frontend/Dockerfile.prod
            image_name: emillysatiro/premaut-frontend

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push (Manual)
      if: github.event_name == 'workflow_dispatch'
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.context }}
        file: ${{ matrix.file }}
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ matrix.image_name }}:latest

    - name: Build and push (Release)
      if: github.event_name == 'release'
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.context }}
        file: ${{ matrix.file }}
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ matrix.image_name }}:latest
          ${{ env.REGISTRY }}/${{ matrix.image_name }}:${{ github.event.release.tag_name }}
