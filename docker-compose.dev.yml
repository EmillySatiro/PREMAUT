services:
  db:
    build:
      context: .
      dockerfile: SQL/Dockerfile
    container_name: premaut-db-dev
    environment:
      POSTGRES_DB: premaut
      POSTGRES_USER: premaut_admin
      POSTGRES_PASSWORD: premaut_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: premaut-backend-dev
    environment:
      APP_ENV: development
      PYTHONUNBUFFERED: "1"
      WATCHFILES_FORCE_POLLING: "true"
      DATABASE_URL: postgresql://premaut_admin:premaut_dev_password@db:5432/premaut
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: premaut-frontend-dev
    environment:
      VITE_API_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  postgres_data_dev:
  frontend_node_modules:
